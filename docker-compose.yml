services:
  postgres:
    image: postgres:16-alpine
    container_name: ird-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ird_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ird_password}
      POSTGRES_DB: ${POSTGRES_DB:-ird_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ird_user} -d ${POSTGRES_DB:-ird_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: adibalhara/ird-backend:v1.0.1
    container_name: ird-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ird_user}:${POSTGRES_PASSWORD:-ird_password}@postgres:5432/${POSTGRES_DB:-ird_db}
      JINA_API_KEY: ${JINA_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY}
      FMP_API_KEY: ${FMP_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey_change_in_production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 1440
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: adibalhara/ird-frontend:v1.0.2
    container_name: ird-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: ird-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
